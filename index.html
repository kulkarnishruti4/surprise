<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I have a surprise for you...</title>
    
    <!-- PRELOAD IMAGES: This forces the browser to load both images instantly in the background -->
    <link rel="preload" as="image" href="watermarked_img_11259626582154809663.png">
    <link rel="preload" as="image" href="watermarked_img_1134324568386148783.png">

    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #fcf8f2;
            font-family: 'Georgia', serif;
            overflow: hidden;
            text-align: center;
        }

        .container {
            max-width: 600px;
            padding: 20px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent; /* Removes the blue flash on mobile tap */
        }

        #oven-screen {
            transition: opacity 0.3s ease; /* Faster transition for instant feel */
        }

        #oven-screen h2 {
            color: #594a42;
            font-size: 1.8rem;
            margin-bottom: 20px;
        }

        #reveal-screen {
            display: none;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .reveal-image {
            width: 100%;
            max-width: 550px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        .hint-text {
            color: #a69080;
            font-size: 0.9rem;
            margin-top: 15px;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="container" onclick="revealSurprise()">
        
        <!-- SCREEN 1 -->
        <div id="oven-screen">
            <h2>Tap the oven to see what's baking...</h2>
            <img src="bun.jpg" alt="A bun in the oven" class="reveal-image">
            <p class="hint-text">(Click anywhere to open)</p>
        </div>

        <!-- SCREEN 2 -->
        <div id="reveal-screen">
            <img src="surprise.jpg" alt="You are going to be a Father!" class="reveal-image">
        </div>

    </div>

    <script>
        function revealSurprise() {
            const ovenScreen = document.getElementById('oven-screen');
            const revealScreen = document.getElementById('reveal-screen');

            if (ovenScreen.style.opacity === '0') return;

            // Swift fade out
            ovenScreen.style.opacity = '0';

            setTimeout(() => {
                ovenScreen.style.display = 'none';
                revealScreen.style.display = 'block';
                
                // Instant fade in for the preloaded baby image
                setTimeout(() => {
                    revealScreen.style.opacity = '1';
                }, 20);
            }, 300); 
        }
    </script>
</body>
</html>
